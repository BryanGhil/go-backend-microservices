syntax = "proto3";

package product;
option go_package = "ecommerce/pb";

// --- Services ---

service ProductService {
  rpc GetProduct (GetProductRequest) returns (GetProductResponse);
  rpc CreateProduct (CreateProductRequest) returns (CreateProductResponse);
  rpc UpdateProduct (UpdateProductRequest) returns (UpdateProductResponse);
  rpc DeleteProduct (DeleteProductRequest) returns (DeleteProductResponse);
  rpc ListProducts (ListProductsRequest) returns (ListProductsResponse);
  rpc GetSellerDashboardProducts (GetSellerDashboardProductsRequest) returns (GetSellerDashboardProductsResponse);
}

// Optional: It is usually better to put this in a separate search.proto later, 
// but it is fine here for now!
service SearchService {
  rpc SearchProducts (SearchRequest) returns (SearchResponse);
}

// --- Core Models ---

// We create a central Product message to keep responses clean and consistent
message Product {
  int64 id = 1;
  int64 seller_id = 2;
  string name = 3;
  string description = 4;
  string category = 5;
  double price = 6;
  string image_url = 7;
  bool is_active = 8;
  int32 stock = 9;
}

// --- Requests & Responses ---

message GetProductRequest {
  int64 id = 1;
}

message GetProductResponse {
  Product product = 1;
}

message CreateProductRequest {
  int64 seller_id = 1; // The Gateway will get this from the Seller's JWT
  string name = 2;
  string description = 3;
  string category = 4;
  double price = 5;
  string image_url = 6;
}

message CreateProductResponse {
  int64 id = 1;
}

message UpdateProductRequest {
  int64 id = 1;
  string name = 2;
  string description = 3;
  string category = 4;
  double price = 5;
  string image_url = 6;
  bool is_active = 7;
}

message UpdateProductResponse {
  bool success = 1;
}

message DeleteProductRequest {
  int64 id = 1;
}

message DeleteProductResponse {
  bool success = 1;
}

// --- Pagination Added Here ---
message ListProductsRequest {
  int32 limit = 1;        // How many items to return (e.g., 10)
  int32 offset = 2;       // How many items to skip (e.g., 0 for page 1, 10 for page 2)
  
  // Optional filters you will definitely need later:
  int64 seller_id = 3;    // If a seller wants to see ONLY their products
  string category = 4;    // If a buyer clicks a category filter
}

message ListProductsResponse {
  repeated Product products = 1;
  int64 total_count = 2;  // Crucial for the frontend to know how many total pages exist
}

// --- Search ---
message SearchRequest {
  string query = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message SearchResponse {
  repeated Product products = 1;
  int64 total_count = 2;
}

message GetSellerDashboardProductsRequest {
  int32 limit = 1;        
  int32 offset = 2;       
  int64 seller_id = 3;    
}

message GetSellerDashboardProductsResponse {
  repeated Product products = 1;
  int64 total_count = 2;
}