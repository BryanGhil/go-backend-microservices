syntax = "proto3";
package inventory;
option go_package = "ecommerce/pb";

service InventoryService {
  rpc GetStock (GetStockRequest) returns (GetStockResponse);
  rpc AdjustStock (AdjustStockRequest) returns (AdjustStockResponse);
}

message GetStockRequest { int64 product_id = 1; }
message GetStockResponse { int32 stock = 1; }

message AdjustStockRequest { int64 product_id = 1; int32 quantity = 2; }
message AdjustStockResponse { bool success = 1; }