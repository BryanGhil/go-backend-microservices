syntax = "proto3";
package order;
option go_package = "ecommerce/pb";

service OrderService {
  rpc CreateOrder (CreateOrderRequest) returns (CreateOrderResponse);
  rpc GetOrderStatus (GetOrderStatusRequest) returns (GetOrderStatusResponse);
  rpc GetUserOrders (GetUserOrdersRequest) returns (GetUserOrdersResponse);
}

// 1. Define the new Checkout Item message
message CheckoutItem {
  int64 product_id = 1;
  int32 quantity = 3;
}

// 2. The request now takes an array (repeated) of items
message CreateOrderRequest {
  int64 user_id = 1;
  repeated CheckoutItem items = 2;
}

// 3. Return the Correlation ID so the frontend can track the whole group
message CreateOrderResponse { 
  string correlation_id = 1; 
}

message GetOrderStatusRequest { 
  int64 order_id = 1; 
}

message GetOrderStatusResponse { 
  string status = 1; 
}

message GetUserOrdersRequest {
  int64 user_id = 1;
}

message OrderItemResponse {
  int64 id = 1;
  double amount = 2;
  string status = 3;
  string correlation_id = 4;
}

message GetUserOrdersResponse {
  repeated OrderItemResponse orders = 1;
}