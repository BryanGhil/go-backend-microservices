basePath: /
definitions:
  dto.AddStockReq:
    properties:
      product_id:
        example: 1
        type: integer
      quantity:
        description: gt=0 ensures they can't add negative stock
        example: 50
        type: integer
    required:
    - product_id
    - quantity
    type: object
  dto.ErrorResponse:
    properties:
      message:
        example: Error description goes here
        type: string
      success:
        example: false
        type: boolean
    type: object
  dto.IDData:
    properties:
      id:
        example: 123
        type: integer
    type: object
  dto.IDResponse:
    properties:
      data:
        $ref: '#/definitions/dto.IDData'
      message:
        example: Operation successful
        type: string
      success:
        example: true
        type: boolean
    type: object
  dto.LoginReq:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  dto.ProductData:
    properties:
      description:
        example: Best mouse in the world
        type: string
      id:
        example: 1
        type: integer
      name:
        example: Wireless Mouse
        type: string
      price:
        example: 49.99
        type: number
    type: object
  dto.ProductListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.ProductData'
        type: array
      message:
        example: Products retrieved successfully
        type: string
      success:
        example: true
        type: boolean
    type: object
  dto.ProductReq:
    properties:
      category:
        example: Gaming
        type: string
      description:
        example: Best mouse in the World
        type: string
      image_url:
        example: www.google.com
        type: string
      name:
        example: Wireless Mouse
        type: string
      price:
        example: 49.99
        type: number
    required:
    - description
    - name
    - price
    type: object
  dto.RegisterReq:
    properties:
      email:
        type: string
      full_name:
        type: string
      password:
        minLength: 6
        type: string
      role:
        description: 'Optional: defaults to "buyer" in usecase'
        type: string
      shop_name:
        description: Required if role is "seller"
        type: string
    required:
    - email
    - full_name
    - password
    type: object
  dto.TokenResponse:
    properties:
      token:
        type: string
    type: object
  dto.UpdateProfileReq:
    properties:
      address:
        type: string
      full_name:
        type: string
      phone:
        type: string
      shop_description:
        description: For Sellers
        type: string
      shop_name:
        description: For Sellers
        type: string
    type: object
  dto.UserIDResponse:
    properties:
      user_id:
        type: integer
    type: object
  handler.CheckoutReq:
    properties:
      amount:
        example: 49.99
        type: number
      product_id:
        example: 1
        type: integer
    type: object
host: localhost:8080
info:
  contact: {}
  description: API Gateway for the Go gRPC E-Commerce system.
  title: E-Commerce Microservices API
  version: "1.0"
paths:
  /api/checkout:
    post:
      consumes:
      - application/json
      description: Initiates the Saga pattern for ordering a product
      parameters:
      - description: Checkout Details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.CheckoutReq'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Create an Order (Checkout)
      tags:
      - Orders
  /api/inventory/{id}:
    get:
      parameters:
      - description: Product ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Get Product Stock
      tags:
      - Inventory
  /api/inventory/add:
    post:
      consumes:
      - application/json
      parameters:
      - description: Stock Details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.AddStockReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Add Physical Stock
      tags:
      - Inventory
  /api/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user and returns a JWT/Session token
      parameters:
      - description: User credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.LoginReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.TokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Login user
      tags:
      - Users
  /api/orders/{id}:
    get:
      description: Check if an order is PENDING, COMPLETED, or CANCELLED
      parameters:
      - description: Order ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get Order Status
      tags:
      - Orders
  /api/payments/{order_id}:
    get:
      description: Check the raw transaction status from the payment gateway
      parameters:
      - description: Order ID
        in: path
        name: order_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Get Payment Status
      tags:
      - Payments
  /api/products:
    get:
      description: Retrieves all products with pagination and optional filters
      parameters:
      - description: Items per page
        in: query
        name: limit
        type: integer
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Filter by category
        in: query
        name: category
        type: string
      - description: Filter by seller
        in: query
        name: seller_id
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ProductListResponse'
      summary: List all products
      tags:
      - Products
    post:
      consumes:
      - application/json
      description: Adds a new product to the catalog. Only Sellers and Admins can
        do this.
      parameters:
      - description: Product Details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ProductReq'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.IDResponse'
      summary: Create a new product
      tags:
      - Products
  /api/products/{id}:
    delete:
      responses: {}
      summary: Delete a product
      tags:
      - Products
    get:
      parameters:
      - description: Product ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses: {}
      summary: Get a product by ID
      tags:
      - Products
    put:
      responses: {}
      summary: Update a product
      tags:
      - Products
  /api/register:
    post:
      consumes:
      - application/json
      description: Registers a new buyer or seller account
      parameters:
      - description: User credentials and profile details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterReq'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.UserIDResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Register a new user
      tags:
      - Users
  /api/search:
    get:
      description: Query the Elasticsearch cluster for products matching the search
        term
      parameters:
      - description: Search term (e.g., 'keyboard')
        in: query
        name: q
        required: true
        type: string
      - description: Items per page (default 10)
        in: query
        name: limit
        type: integer
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Search products
      tags:
      - Search
  /api/users/profile:
    put:
      consumes:
      - application/json
      description: Updates the profile of the currently authenticated user
      parameters:
      - description: Profile Data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateProfileReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update User Profile
      tags:
      - Users
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
