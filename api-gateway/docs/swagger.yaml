basePath: /
definitions:
  dto.AddStockReq:
    properties:
      product_id:
        example: 1
        type: integer
      quantity:
        description: gt=0 ensures they can't add negative stock
        example: 50
        type: integer
    required:
    - product_id
    - quantity
    type: object
  dto.AddToCartReq:
    properties:
      product_id:
        example: 105
        type: integer
      quantity:
        example: 1
        type: integer
    required:
    - product_id
    - quantity
    type: object
  dto.CheckoutItemReq:
    properties:
      product_id:
        example: 105
        type: integer
      quantity:
        example: 2
        minimum: 1
        type: integer
    required:
    - product_id
    - quantity
    type: object
  dto.CheckoutReq:
    properties:
      items:
        items:
          $ref: '#/definitions/dto.CheckoutItemReq'
        type: array
    required:
    - items
    type: object
  dto.ErrorResponse:
    properties:
      message:
        example: Error description goes here
        type: string
      success:
        example: false
        type: boolean
    type: object
  dto.GoogleLoginReq:
    properties:
      client_type:
        enum:
        - web
        - mobile
        example: mobile
        type: string
      id_token:
        example: eyJhbGciOiJSUzI1NiIs...
        type: string
    required:
    - client_type
    - id_token
    type: object
  dto.IDData:
    properties:
      id:
        example: 123
        type: integer
    type: object
  dto.IDResponse:
    properties:
      data:
        $ref: '#/definitions/dto.IDData'
      message:
        example: Operation successful
        type: string
      success:
        example: true
        type: boolean
    type: object
  dto.LoginOTPResponse:
    properties:
      message:
        example: OTP sent to email
        type: string
      requires_otp:
        example: true
        type: boolean
    type: object
  dto.LoginReq:
    properties:
      email:
        example: zzz@zzz.com
        type: string
      password:
        example: "12345678"
        type: string
    required:
    - email
    - password
    type: object
  dto.LogoutReq:
    properties:
      refresh_token:
        description: Not required because web clients send it via cookie
        example: your-uuid-refresh-token
        type: string
    type: object
  dto.ProductData:
    properties:
      description:
        example: Best mouse in the world
        type: string
      id:
        example: 1
        type: integer
      name:
        example: Wireless Mouse
        type: string
      price:
        example: 49.99
        type: number
    type: object
  dto.ProductListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.ProductData'
        type: array
      message:
        example: Products retrieved successfully
        type: string
      success:
        example: true
        type: boolean
    type: object
  dto.ProductReq:
    properties:
      category:
        example: Gaming
        type: string
      description:
        example: Best mouse in the World
        type: string
      image_url:
        example: www.google.com
        type: string
      name:
        example: Wireless Mouse
        type: string
      price:
        example: 49.99
        type: number
    required:
    - description
    - name
    - price
    type: object
  dto.RefreshTokenReq:
    properties:
      refresh_token:
        example: your-uuid-refresh-token
        type: string
    type: object
  dto.RegisterReq:
    properties:
      email:
        example: zzz@zzz.com
        type: string
      full_name:
        example: Zzz Zzz
        type: string
      password:
        example: "12345678"
        minLength: 6
        type: string
      role:
        description: 'Optional: defaults to "buyer" in usecase'
        example: seller
        type: string
      shop_name:
        description: Required if role is "seller"
        example: Zz Shop
        type: string
    required:
    - email
    - full_name
    - password
    type: object
  dto.ResendOTPReq:
    properties:
      email:
        example: zzz@zzz.com
        type: string
    required:
    - email
    type: object
  dto.SessionInfoResponse:
    properties:
      client_ip:
        example: 192.168.1.5
        type: string
      created_at:
        example: "2024-05-12T15:04:05Z"
        type: string
      session_id:
        example: uuid-string
        type: string
      user_agent:
        example: Mozilla/5.0 (Windows NT 10.0; Win64; x64)...
        type: string
    type: object
  dto.TokenResponse:
    properties:
      access_token:
        example: eyJhbGciOiJIUzI1NiIs...
        type: string
      refresh_token:
        example: your-uuid-refresh-token
        type: string
      user:
        $ref: '#/definitions/dto.TokenUserResponse'
    type: object
  dto.TokenUserResponse:
    properties:
      email:
        example: example@gmail.com
        type: string
      role:
        example: seller
        type: string
      user_id:
        example: 1
        type: integer
    type: object
  dto.UpdateProfileReq:
    properties:
      address:
        example: ZZ Street
        type: string
      full_name:
        example: Zzz
        type: string
      phone:
        example: "0812345678"
        type: string
      shop_description:
        description: For Sellers
        example: Welcome to ZZZ Shop
        type: string
      shop_name:
        description: For Sellers
        example: ZZ Shop
        type: string
    type: object
  dto.UserIDResponse:
    properties:
      user_id:
        type: integer
    type: object
  dto.UserProfileRes:
    properties:
      address:
        example: ZZZ Street
        type: string
      email:
        example: zzz@zzz.com
        type: string
      full_name:
        example: Hello World
        type: string
      phone:
        example: "12345678"
        type: string
      shop_description:
        example: The best shop in the world
        type: string
      shop_name:
        example: ZZ Shop
        type: string
      user_id:
        example: 1
        type: integer
    type: object
  dto.VerifyOTPReq:
    properties:
      client_type:
        enum:
        - web
        - mobile
        example: web
        type: string
      email:
        example: zzz@zzz.com
        type: string
      otp:
        example: "123456"
        type: string
    required:
    - client_type
    - email
    - otp
    type: object
host: localhost:8080
info:
  contact: {}
  description: API Gateway for the Go gRPC E-Commerce system.
  title: E-Commerce Microservices API
  version: "1.0"
paths:
  /api/auth/google:
    post:
      consumes:
      - application/json
      description: Authenticates via Google ID token. Auto-captures device metadata.
      parameters:
      - description: Google ID Token and client type
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.GoogleLoginReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.TokenResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      summary: Google OAuth Login
      tags:
      - Auth
  /api/auth/login:
    post:
      consumes:
      - application/json
      description: Validates credentials and sends a 6-digit OTP to the user's email.
      parameters:
      - description: User credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.LoginReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.LoginOTPResponse'
        "400":
          description: Invalid JSON format
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Invalid credentials
          schema:
            additionalProperties: true
            type: object
      summary: 'Step 1: Login user'
      tags:
      - Auth
  /api/auth/logout:
    post:
      consumes:
      - application/json
      description: Logs out the current session and clears the HttpOnly cookie
      parameters:
      - description: Refresh Token (Required for mobile)
        in: body
        name: request
        schema:
          $ref: '#/definitions/dto.LogoutReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Logout current device
      tags:
      - Auth
  /api/auth/refresh:
    post:
      consumes:
      - application/json
      description: Rotates the refresh token and captures new IP if the user changed
        Wi-Fi.
      parameters:
      - description: Refresh Token (Required for mobile)
        in: body
        name: request
        schema:
          $ref: '#/definitions/dto.RefreshTokenReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.TokenResponse'
      summary: Refresh Access Token
      tags:
      - Auth
  /api/auth/register:
    post:
      consumes:
      - application/json
      description: Registers a new buyer or seller account
      parameters:
      - description: User credentials and profile details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterReq'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.UserIDResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Register a new user
      tags:
      - Auth
  /api/auth/resend-otp:
    post:
      consumes:
      - application/json
      description: Sends a new 6-digit OTP to the user's email
      parameters:
      - description: User Email
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ResendOTPReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Resend OTP
      tags:
      - Auth
  /api/auth/verify-otp:
    post:
      consumes:
      - application/json
      description: Verifies the 6-digit OTP and issues JWT tokens based on client_type.
      parameters:
      - description: Email, OTP, and client type
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.VerifyOTPReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.TokenResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      summary: 'Step 2: Verify OTP'
      tags:
      - Auth
  /api/cart/:
    get:
      description: Fetches the complete cart with real-time product prices and details
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get Current User's Cart
      tags:
      - Cart
  /api/cart/add:
    post:
      consumes:
      - application/json
      description: Adds a product to the cart or updates its quantity. Send negative
        quantity to subtract.
      parameters:
      - description: Product and Quantity
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.AddToCartReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Add or Update Cart Item
      tags:
      - Cart
  /api/cart/clear:
    delete:
      description: Empties the cart. Usually called automatically after successful
        payment.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Clear Entire Cart
      tags:
      - Cart
  /api/cart/count:
    get:
      description: Super fast endpoint to get total number of items for the frontend
        cart icon badge
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get Cart Badge Count
      tags:
      - Cart
  /api/cart/remove/{product_id}:
    delete:
      description: Completely deletes a product from the user's cart (like clicking
        the trash icon)
      parameters:
      - description: Product ID
        in: path
        name: product_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Remove Item from Cart
      tags:
      - Cart
  /api/checkout:
    post:
      consumes:
      - application/json
      description: Initiates the Saga pattern for ordering one or multiple products
      parameters:
      - description: product_id and quantity
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CheckoutReq'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Create an Order (Checkout)
      tags:
      - Orders
  /api/inventory/{id}:
    get:
      parameters:
      - description: Product ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Get Product Stock
      tags:
      - Inventory
  /api/inventory/add:
    post:
      consumes:
      - application/json
      parameters:
      - description: Stock Details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.AddStockReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Add Physical Stock
      tags:
      - Inventory
  /api/orders:
    get:
      description: Fetch all orders for the authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get User Orders
      tags:
      - Orders
  /api/orders/{id}:
    get:
      description: Check if an individual order is PENDING, COMPLETED, or CANCELLED
      parameters:
      - description: Order ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get Order Status
      tags:
      - Orders
  /api/payments/{order_id}:
    get:
      description: Check the raw transaction status from the payment gateway
      parameters:
      - description: Order ID
        in: path
        name: order_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Get Payment Status
      tags:
      - Payments
  /api/products:
    get:
      description: Retrieves all products with pagination and optional filters
      parameters:
      - description: Items per page
        in: query
        name: limit
        type: integer
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Filter by category
        in: query
        name: category
        type: string
      - description: Filter by seller
        in: query
        name: seller_id
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ProductListResponse'
      summary: List all products
      tags:
      - Products
    post:
      consumes:
      - application/json
      description: Adds a new product to the catalog. Only Sellers and Admins can
        do this.
      parameters:
      - description: Product Details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ProductReq'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.IDResponse'
      security:
      - BearerAuth: []
      summary: Create a new product
      tags:
      - Products
  /api/products/{id}:
    delete:
      description: Deletes a product from the catalog. Only the owning Seller or an
        Admin can delete.
      parameters:
      - description: Product ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Delete a product
      tags:
      - Products
    get:
      parameters:
      - description: Product ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses: {}
      summary: Get a product by ID
      tags:
      - Products
    put:
      consumes:
      - application/json
      description: Updates an existing product's details. Only the owning Seller or
        an Admin can update.
      parameters:
      - description: Product ID
        in: path
        name: id
        required: true
        type: integer
      - description: Product Details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ProductReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Update a product
      tags:
      - Products
  /api/search:
    get:
      description: Query the Elasticsearch cluster for products matching the search
        term
      parameters:
      - description: Search term (e.g., 'keyboard')
        in: query
        name: q
        required: true
        type: string
      - description: Items per page (default 10)
        in: query
        name: limit
        type: integer
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Search products
      tags:
      - Search
  /api/users/profile:
    get:
      description: Get user profile email, id, address, phone number, etc
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.UserProfileRes'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get User Profile
      tags:
      - Users
    put:
      consumes:
      - application/json
      description: Updates the profile of the currently authenticated user
      parameters:
      - description: Profile Data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateProfileReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update User Profile
      tags:
      - Users
  /api/users/sessions:
    delete:
      description: Logs the user out of EVERY device
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Revoke All Sessions
      tags:
      - Users
    get:
      description: Lists all devices currently logged into this account
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.SessionInfoResponse'
            type: array
      security:
      - BearerAuth: []
      summary: Get Active Sessions
      tags:
      - Users
  /api/users/sessions/{session_id}:
    delete:
      description: Logs out a specific device
      parameters:
      - description: Session ID
        in: path
        name: session_id
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Revoke Specific Session
      tags:
      - Users
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
